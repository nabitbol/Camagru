<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../../global-style/main.css">
  <link rel="stylesheet" href="style.css">
  <script src="../../global-scripts/main.js"></script>
  <script src="main.js"></script>

  <title>Sign in</title>
</head>
<body>
  <div class="unauthenticated-layout">
    <div class="container">
      <h1>Sign in</h1>
      <p id="invalid-credentials-error" class="error hidden">Invalid credentials</p>
      <div class="input">
        <label>Email address</label>
        <input id="email" type="email" placeholder="your@email.com">
        <p id="email-error" class="error hidden">Invalid email address</p>
      </div>
      <div class="input">
        <label>Password</label>
        <input id="password" type="password" placeholder="xxxxxxxxxxx">
        <p id="password-error" class="error hidden">Invalid password</p>
        <div class="reset-password">
          <a href="#">Reset password</a>
        </div>
      </div>
      <button class="primary" onClick="signup()">Sign in</button>
    </div>
  </div>
</body>
</html>
